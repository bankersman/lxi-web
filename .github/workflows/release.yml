  #       env:
  #         TOKEN: ${{ secrets.NPM_TOKEN }}
  #       run: |
  #         if [ -n "$TOKEN" ]; then
  #           echo "enabled=true" >> "$GITHUB_OUTPUT"
  #         else
  #           echo "::warning::NPM_TOKEN secret is not set; skipping npm publish."
  #           echo "enabled=false" >> "$GITHUB_OUTPUT"
