name: Bug report
description: Something is broken.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Be as literal as possible. Include the instrument `*IDN?` if the bug is instrument-specific.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / SCPI transcript
      description: Server logs, browser console, raw SCPI console output.
      render: text

  - type: input
    id: build
    attributes:
      label: Dashboard build
      description: Docker image digest, or `git rev-parse HEAD` for a source build.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: Firefox 125 / macOS 14
