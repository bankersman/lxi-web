services:
  lxi-web:
    # Swap to :latest on release, or pin to a tag for reproducible deploys.
    image: ghcr.io/lxi-web/lxi-web:latest
    ports:
      - "8787:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      LOG_LEVEL: info
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - "fetch('http://127.0.0.1:8787/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
