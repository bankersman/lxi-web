name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive base path
        id: base
        run: echo "base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install and build VitePress site
        working-directory: docs/site
        env:
          DOCS_BASE: ${{ steps.base.outputs.base }}
          DOCS_REPO_SLUG: ${{ github.repository }}
          DOCS_REPO_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
